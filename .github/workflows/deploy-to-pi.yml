name: Auto Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Ensure passwordless sudo for service management
        run: |
          RULE="pi ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart bigrock.service, /usr/bin/systemctl status bigrock.service"
          if ! sudo grep -qF "bigrock.service" /etc/sudoers.d/bigrock-runner 2>/dev/null; then
            echo "$RULE" | sudo tee /etc/sudoers.d/bigrock-runner
            sudo chmod 440 /etc/sudoers.d/bigrock-runner
          fi

      - name: Pull latest code
        run: |
          cd /home/pi/bigrock-app
          git fetch origin main
          git reset --hard origin/main

      - name: Generate version file
        run: |
          cd /home/pi/bigrock-app
          VERSION="4.$(git rev-list --count HEAD)"
          echo "$VERSION" > version.txt
          echo "Generated version: $VERSION"

      - name: Detect changed files
        id: changed
        run: |
          cd /home/pi/bigrock-app
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if echo "$FILES" | grep -qE '\.py$'; then
            echo "py_changed=true" >> $GITHUB_ENV
          else
            echo "py_changed=false" >> $GITHUB_ENV
          fi
          echo "Changed files: $FILES"

      - name: Restart bigrock.service if Python files changed
        if: env.py_changed == 'true'
        run: |
          echo "🔁 Restarting bigrock.service..."
          sudo systemctl restart bigrock.service
          sleep 2
          sudo systemctl status bigrock.service --no-pager
