<header class="site-header" id="site-header">
  <!-- Demo badge (shown by nav.js when data_source = demo) -->
  <div id="nav-demo-badge" class="header-demo-badge" style="display:none">&#9888; DEMO MODE</div>

  <div class="header-main">
    <!-- Left: Logo + Tournament Info -->
    <div class="header-left">
      <img id="nav-logo" src="/static/images/bigrock.png" alt="Tournament Logo" class="header-logo">
      <div class="header-tournament-info">
        <div id="nav-tournament-name" class="header-tournament-name">&nbsp;</div>
        <div id="nav-tournament-date" class="header-tournament-date"></div>
        <a id="nav-today-badge" class="header-today-badge" href="/participants?today=1" style="display:none">
          &#127907; <span id="nav-today-count">0</span> TODAY
        </a>
        <div id="nav-vhf-live" class="header-vhf-live-badge" style="display:none">&#9654; VHF LIVE</div>
      </div>
    </div>

    <!-- Center: VHF Controls -->
    <div style="display:flex;justify-content:center">
      <div class="vhf-pod" id="nav-vhf-pod">
        <button data-vhf-toggle class="vhf-toggle-btn">VHF ON</button>
        <div class="vhf-vol-row">
          <span class="vhf-vol-icon">&#128266;</span>
          <input type="range" min="0" max="100" value="30" data-vhf-volume class="vhf-vol-slider">
          <span data-vhf-volume-display class="vhf-vol-display">30%</span>
        </div>
      </div>
    </div>

    <!-- Right: Navigation -->
    <nav class="header-nav">
      <a href="/" class="header-nav-btn" data-page="home">Home</a>
      <a href="/participants" class="header-nav-btn" data-page="participants">Participants</a>
      <a href="/leaderboard" class="header-nav-btn" data-page="leaderboard">Leaderboard</a>
      <a href="/release-summary" class="header-nav-btn" data-page="releases">Releases</a>
      <a href="/settings-page" class="header-nav-btn header-nav-settings" data-page="settings">&#9881;</a>
    </nav>
  </div>

  <!-- Followed Boats Strip — compact toggle badge + expandable drawer -->
  <div id="nav-followed-strip" class="followed-strip" style="display:none">
    <button class="followed-toggle-btn" id="nav-followed-toggle" onclick="window._navToggleFollowed()">
      &#9733; <span id="nav-followed-count">0</span> WATCHING &#9660;
    </button>
    <div id="nav-followed-drawer" class="followed-drawer" style="display:none">
      <div id="nav-followed-boats"></div>
    </div>
  </div>

  <!-- Message Ticker -->
  <div id="nav-ticker-bar" class="ticker-bar" style="display:none">
    <div id="nav-ticker-track" class="ticker-track"></div>
  </div>

  <!-- Version tag -->
  <div id="nav-version" class="header-version-tag"></div>
</header>
