<header class="site-header" id="site-header">
  <!-- Demo badge (shown by nav.js when data_source = demo) -->
  <div id="nav-demo-badge" class="header-demo-badge" style="display:none">&#9888; DEMO MODE</div>

  <div class="header-main">
    <!-- Left: Logo + Tournament Info -->
    <div class="header-left">
      <img id="nav-logo" src="/static/images/bigrock.png" alt="Tournament Logo" class="header-logo">
      <div class="header-tournament-info">
        <div id="nav-tournament-name" class="header-tournament-name">&nbsp;</div>
        <div id="nav-tournament-date" class="header-tournament-date"></div>
        <div id="nav-vhf-live" class="header-vhf-live-badge" style="display:none">&#9654; VHF LIVE</div>
      </div>
    </div>

    <!-- Center: VHF Controls -->
    <div class="vhf-pod-wrapper" style="display:flex;justify-content:center">
      <div class="vhf-pod" id="nav-vhf-pod">
        <button data-vhf-toggle class="vhf-toggle-btn">VHF ON</button>
        <div class="vhf-vol-row">
          <span class="vhf-vol-icon">&#128266;</span>
          <input type="range" min="0" max="100" value="30" data-vhf-volume class="vhf-vol-slider">
          <span data-vhf-volume-display class="vhf-vol-display">30%</span>
        </div>
      </div>
    </div>

    <!-- Right: Navigation -->
    <nav class="header-nav">
      <a href="/" class="header-nav-btn" data-page="home">Home</a>
      <a href="/participants" class="header-nav-btn" data-page="participants">Participants</a>
      <a href="/leaderboard" class="header-nav-btn" data-page="leaderboard">Leaderboard</a>
      <a href="/release-summary" class="header-nav-btn" data-page="releases">Releases</a>
      <a href="/settings-page" class="header-nav-btn header-nav-settings" data-page="settings">&#9881;</a>
    </nav>
  </div>

  <!-- Stats Pills Row: Enrolled · Today · Watching -->
  <div id="nav-stats-row" class="stats-pills-row">
    <div class="stats-pills">
      <button class="stat-pill pill-enrolled" id="nav-pill-enrolled" onclick="window._navTogglePill('enrolled')">
        &#127907; <span id="nav-enrolled-count">&#8230;</span> ENROLLED <span class="pill-caret">&#9660;</span>
      </button>
      <button class="stat-pill pill-today" id="nav-pill-today" onclick="window._navTogglePill('today')">
        &#128197; <span id="nav-today-count">0</span> TODAY <span class="pill-caret">&#9660;</span>
      </button>
      <button class="stat-pill pill-watching" id="nav-pill-watching" onclick="window._navTogglePill('watching')">
        &#9733; <span id="nav-followed-count">0</span> WATCHING <span class="pill-caret">&#9660;</span>
      </button>
    </div>
    <div id="nav-stats-drawer" class="stats-drawer" style="display:none">
      <div id="nav-drawer-enrolled" class="stats-panel" style="display:none">
        <a href="/participants" class="stats-see-all">&#8594; View all enrolled</a>
        <div id="nav-enrolled-boats" class="stats-drawer-boats"></div>
      </div>
      <div id="nav-drawer-today" class="stats-panel" style="display:none">
        <a href="/participants?today=1" class="stats-see-all">&#8594; See all today</a>
        <div id="nav-today-boats" class="stats-drawer-boats"></div>
      </div>
      <div id="nav-drawer-watching" class="stats-panel" style="display:none">
        <a href="/participants?followed=1" class="stats-see-all">&#8594; View followed</a>
        <div id="nav-watching-boats" class="stats-drawer-boats"></div>
      </div>
    </div>
  </div>

  <!-- Message Ticker -->
  <div id="nav-ticker-bar" class="ticker-bar" style="display:none">
    <div id="nav-ticker-track" class="ticker-track"></div>
  </div>

  <!-- Version tag -->
  <div id="nav-version" class="header-version-tag"></div>
</header>
